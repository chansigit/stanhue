<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Subtle radial glow behind scatter points -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </radialGradient>
    <!-- Shadow filter for the badge -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg-glow)" stroke="#e2e8f0" stroke-width="2"/>

  <!-- === Scatter points: 6 groups from PAIRED_PALETTE === -->

  <!-- Group 1: Blues (upper-left cluster) -->
  <circle cx="128" cy="148" r="18" fill="#a6cee3" opacity="0.92"/>
  <circle cx="108" cy="172" r="12" fill="#a6cee3" opacity="0.80"/>
  <circle cx="148" cy="128" r="10" fill="#1f78b4" opacity="0.92"/>
  <circle cx="140" cy="168" r="14" fill="#1f78b4" opacity="0.88"/>
  <circle cx="118" cy="138" r="8"  fill="#1f78b4" opacity="0.75"/>
  <circle cx="155" cy="155" r="6"  fill="#a6cee3" opacity="0.70"/>

  <!-- Group 2: Greens (upper-right cluster) -->
  <circle cx="340" cy="120" r="16" fill="#b2df8a" opacity="0.92"/>
  <circle cx="365" cy="145" r="20" fill="#33a02c" opacity="0.90"/>
  <circle cx="355" cy="108" r="10" fill="#b2df8a" opacity="0.78"/>
  <circle cx="380" cy="128" r="8"  fill="#33a02c" opacity="0.82"/>
  <circle cx="328" cy="138" r="12" fill="#b2df8a" opacity="0.85"/>
  <circle cx="372" cy="155" r="6"  fill="#33a02c" opacity="0.70"/>

  <!-- Group 3: Reds (center-left cluster) -->
  <circle cx="165" cy="275" r="22" fill="#fb9a99" opacity="0.90"/>
  <circle cx="140" cy="255" r="14" fill="#e31a1c" opacity="0.92"/>
  <circle cx="185" cy="258" r="10" fill="#fb9a99" opacity="0.80"/>
  <circle cx="148" cy="290" r="16" fill="#e31a1c" opacity="0.85"/>
  <circle cx="175" cy="295" r="8"  fill="#fb9a99" opacity="0.72"/>

  <!-- Group 4: Oranges (center-right cluster) -->
  <circle cx="355" cy="260" r="20" fill="#fdbf6f" opacity="0.90"/>
  <circle cx="375" cy="240" r="12" fill="#ff7f00" opacity="0.92"/>
  <circle cx="340" cy="240" r="14" fill="#fdbf6f" opacity="0.82"/>
  <circle cx="380" cy="270" r="10" fill="#ff7f00" opacity="0.88"/>
  <circle cx="360" cy="285" r="8"  fill="#fdbf6f" opacity="0.75"/>

  <!-- Group 5: Purples (lower-left cluster) -->
  <circle cx="185" cy="380" r="16" fill="#cab2d6" opacity="0.90"/>
  <circle cx="165" cy="365" r="12" fill="#6a3d9a" opacity="0.92"/>
  <circle cx="200" cy="395" r="10" fill="#cab2d6" opacity="0.80"/>
  <circle cx="148" cy="388" r="14" fill="#6a3d9a" opacity="0.85"/>
  <circle cx="178" cy="400" r="7"  fill="#cab2d6" opacity="0.72"/>

  <!-- Group 6: Yellow-Brown (lower-right cluster) -->
  <circle cx="340" cy="375" r="14" fill="#ffff99" opacity="0.92"/>
  <circle cx="362" cy="390" r="18" fill="#b15928" opacity="0.88"/>
  <circle cx="355" cy="360" r="10" fill="#ffff99" opacity="0.80"/>
  <circle cx="328" cy="395" r="12" fill="#b15928" opacity="0.82"/>
  <circle cx="375" cy="370" r="7"  fill="#ffff99" opacity="0.70"/>

  <!-- Small scattered accent dots (visual texture) -->
  <circle cx="250" cy="195" r="4" fill="#a6cee3" opacity="0.45"/>
  <circle cx="270" cy="200" r="3" fill="#33a02c" opacity="0.40"/>
  <circle cx="235" cy="320" r="4" fill="#e31a1c" opacity="0.40"/>
  <circle cx="280" cy="330" r="3" fill="#ff7f00" opacity="0.42"/>
  <circle cx="258" cy="260" r="5" fill="#6a3d9a" opacity="0.35"/>

  <!-- "stanhue" text -->
  <text x="256" y="475" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="52" font-weight="700" fill="#334155" letter-spacing="-1">
    stan<tspan fill="#1f78b4">hue</tspan>
  </text>
</svg>
